#
# GRUB Debug Configuration
# This file contains debug options for troubleshooting GRUB boot issues
#
# Usage:
#   Build with: make GRUB_DEBUG=yes
#   Boot with: e (edit) at GRUB menu, then append: set debug=all
#

# Enable GRUB debug output (verbose logging)
set debug=all

# Enable pager (pause on full screen)
set pager=1

# Show all GRUB messages
set verbose=1

# Log GRUB execution to console
# This helps see what GRUB is doing at each step
